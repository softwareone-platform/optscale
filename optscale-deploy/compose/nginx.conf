worker_processes auto;

events {
    worker_connections 1024;
}

http {
    client_max_body_size 512m;

    proxy_read_timeout    600;
    proxy_send_timeout    600;
    proxy_connect_timeout 30;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "keep-alive";

    # Resolve Compose service names at request time so recreated containers
    # do not leave nginx proxying to stale container IPs.
    resolver 127.0.0.11 ipv6=off valid=10s;

    server {
        listen 80;

        location /auth/ {
            set $auth_upstream http://auth:8905;
            proxy_pass $auth_upstream;
        }
        location /restapi/ {
            set $restapi_upstream http://restapi:8999;
            proxy_pass $restapi_upstream;
        }
        location /report/ {
            set $keeper_upstream http://keeper:8973;
            proxy_pass $keeper_upstream;
        }
        location /herald/ {
            set $herald_upstream http://herald-api:8906;
            proxy_pass $herald_upstream;
        }
        location /katara/ {
            set $katara_upstream http://katara:8935;
            proxy_pass $katara_upstream;
        }
        location /insider/ {
            set $insider_upstream http://insider-api:8945;
            proxy_pass $insider_upstream;
        }
        location /slacker/ {
            set $slacker_upstream http://slacker:80;
            proxy_pass $slacker_upstream;
        }
        location /metroculus/ {
            set $metroculus_upstream http://metroculusapi:8969;
            proxy_pass $metroculus_upstream;
        }
        location /jira_bus/ {
            set $jirabus_upstream http://jira-bus:8977;
            proxy_pass $jirabus_upstream;
        }
        location /jira_ui/ {
            set $jiraui_upstream http://jira-ui:4000;
            proxy_pass $jiraui_upstream;
        }
        location /storage/ {
            set $diproxy_upstream http://diproxy:8935;
            proxy_pass $diproxy_upstream;
        }
        location /subspector/ {
            set $subspector_upstream http://subspector:8800;
            proxy_pass $subspector_upstream;
        }
        location / {
            set $ngui_upstream http://ngui:4000;
            proxy_pass $ngui_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
