name: Manage PR "ui" label

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read # Recommended for actions/checkout
  pull-requests: write
  issues: write

jobs:
  manage-ui-label:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Filter changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ngui:
              - 'ngui/**'

      - name: Add "ui" label if ngui files changed
        if: steps.filter.outputs.ngui == 'true'
        uses: ./.github/actions/add_pull_request_label
        with:
          label: ui

      - name: Remove "ui" label if no ngui files changed
        if: steps.filter.outputs.ngui != 'true'
        uses: ./.github/actions/remove_pull_request_label
        with:
          label: ui
