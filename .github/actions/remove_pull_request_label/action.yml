name: Remove pull request label
description: Remove a label the pull request that triggered the workflow (ignores 404 if the label is not present)
inputs:
  label:
    description: Name of the label to remove
    type: string
    required: true
runs:
  using: composite
  steps:
    - name: Remove label
      uses: actions/github-script@v8
      with:
        script: |
          try {
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: '${{ inputs.label }}',
            });
          } catch (e) {
            if (e.status !== 404) throw e;
          }
